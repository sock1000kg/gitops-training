# mention-mate-app — dev | image test nhẹ: traefik/whoami — backend + worker
components:
  backend:
    image: { repository: traefik/whoami, tag: "v1.10.3" }
    replicaCount: 1
    port: 80
    httpRoute:
      enabled: true
      hostnames: ["mention-mate-app-dev.duongot.work"]
      pathPrefixes: ["/api"]
  worker:
    image: { repository: traefik/whoami, tag: "v1.10.3" }
    replicaCount: 1
  schedular:
    image:
      repository: traefik/whoami
      tag: "v1.10.3"
    replicaCount: 1
sealedSecret:
  enabled: false # repo test: bỏ secret để pod chạy ngay (không cần kubeseal)
