apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: platform
  namespace: argocd
spec:
  description: Platform components (sealed-secrets, kgateway, shared gateway)
  sourceRepos:
    - https://bitnami-labs.github.io/sealed-secrets
    - cr.kgateway.dev/kgateway-dev/charts
    - https://github.com/sock1000kg/gitops-training.git
  destinations:
    - server: https://kubernetes.default.svc
      namespace: kube-system
    - server: https://kubernetes.default.svc
      namespace: kgateway-system
    - server: https://kubernetes.default.svc
      namespace: argocd            # HTTPRoute expose ArgoCD qua shared gateway
  clusterResourceWhitelist:
    - group: "*"
      kind: "*"
