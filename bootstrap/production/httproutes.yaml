# Quản lý các HTTPRoute đứng riêng (không do chart app sinh) — đều trỏ shared-gw.
# Hiện có: route ArgoCD UI. Thêm route mới = thêm manifest vào platform/httproutes/.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: httproutes
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: platform
  source:
    repoURL: https://github.com/ongtungduong/gitops-training.git
    targetRevision: main
    path: platform/httproutes
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
