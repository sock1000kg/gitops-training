apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: birdnet-market
  namespace: argocd
spec:
  description: Project birdnet-market (apps/birdnet-market/)
  sourceRepos:
    - https://github.com/sock1000kg/gitops-training.git
  destinations:
    - server: https://kubernetes.default.svc
      namespace: "birdnet-market-*"
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
