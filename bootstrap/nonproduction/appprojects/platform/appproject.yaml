apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: platform
  namespace: argocd
spec:
  description: Platform components (sealed-secrets, kgateway, shared gateway, logging)
  sourceRepos:
    - https://bitnami-labs.github.io/sealed-secrets
    - cr.kgateway.dev/kgateway-dev/charts
    - https://github.com/sock1000kg/gitops-training.git
    - https://fluent.github.io/helm-charts # Authorized Fluent Bit Repo
  destinations:
    - server: https://kubernetes.default.svc
      namespace: kube-system
    - server: https://kubernetes.default.svc
      namespace: kgateway-system
    - server: https://kubernetes.default.svc
      namespace: argocd
    - server: https://kubernetes.default.svc
      namespace: logging # Authorized Logging Namespace
  clusterResourceWhitelist:
    - group: "*"
      kind: "*"
