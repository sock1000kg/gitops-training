# Route ArgoCD UI qua gateway DÙNG CHUNG shared-gw: argocd.duongot.work -> argocd-server.
# (server.insecure đặt THỦ CÔNG, không GitOps.)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd
  namespace: argocd
spec:
  parentRefs:
    - name: shared-gw
      namespace: kgateway-system
  hostnames:
    - argocd.duongot.work
  rules:
    - backendRefs:
        - name: argocd-server
          port: 80
