# Route ArgoCD UI qua gateway DÙNG CHUNG shared-gw: argocd.duongot.work -> argocd-server.
# (server.insecure đặt THỦ CÔNG, không GitOps.)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd
  namespace: argocd
spec:
  # group/kind/weight/matches ghi rõ = giá trị apiserver default -> tránh ArgoCD OutOfSync triền miên
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: shared-gw
      namespace: kgateway-system
  hostnames:
    - argocd.duongot.work
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: argocd-server
          port: 80
          weight: 1
