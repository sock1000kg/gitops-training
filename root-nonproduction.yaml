# App-of-Apps gốc cho tier nonproduction — apply TAY lên ArgoCD của cluster nonproduction.
# recurse:false -> chỉ đọc 4 file cấp 1 trong bootstrap/nonproduction (các subdir do appset quản lý).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-nonproduction
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/sock1000kg/gitops-training.git
    targetRevision: main
    path: bootstrap/nonproduction
    directory:
      recurse: false
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
